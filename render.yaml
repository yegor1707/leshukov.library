services:
  - type: web
    name: leshukov-library
    env: node
    region: frankfurt
    plan: free
    nodeVersion: 20.x
    buildCommand: bash scripts/build-render.sh
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
