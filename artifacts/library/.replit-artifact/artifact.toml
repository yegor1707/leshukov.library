kind = "web"
previewPath = "/"
title = "Leshukov Library"
version = "1.0.0"
id = "artifacts/library"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20252

[services.development]
run = "pnpm --filter @workspace/library run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/library", "run", "build" ]
publicDir = "artifacts/library/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20252"
BASE_PATH = "/"
